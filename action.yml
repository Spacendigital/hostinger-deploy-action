name: 'Hostinger Deploy'
description: 'Deploy a Next.js app to Hostinger with GitHub Deployments tracking. Supports auto (Hostinger Git auto-deploy), SFTP, and FTP modes.'
author: 'Spacendigital'

inputs:
  host:
    description: 'Server hostname or IP (required for sftp/ftp modes)'
    required: false
  username:
    description: 'SFTP/SSH username (required for sftp/ftp modes)'
    required: false
  password:
    description: 'SFTP/SSH password'
    required: false
  private-key:
    description: 'SSH private key content (alternative to password)'
    required: false
  target-dir:
    description: 'Directory on the server to upload to e.g. /public_html (required for sftp/ftp modes)'
    required: false
  build-command:
    description: 'Build command to run (default: npm run build)'
    required: false
    default: 'npm run build'
  deploy-mode:
    description: 'Deploy mode: auto (Hostinger Git auto-deploy), sftp, or ftp'
    required: false
    default: 'auto'
  install-command:
    description: 'Install command (default: npm ci)'
    required: false
    default: 'npm ci'
  clean:
    description: 'Delete all files in target-dir before uploading (true/false)'
    required: false
    default: 'false'
  environment:
    description: 'GitHub deployment environment name e.g. production, staging'
    required: false
    default: 'production'
  live-url:
    description: 'URL of the live site (shown in deployment status)'
    required: true
  source-dir:
    description: 'Directory to upload (default: out/)'
    required: false
    default: 'out'

runs:
  using: 'composite'
  steps:
    - name: Install action dependencies
      run: npm ci --prefix ${{ github.action_path }}
      shell: bash

    - name: Run deploy
      run: node ${{ github.action_path }}/dist/main.js
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}

branding:
  icon: 'upload-cloud'
  color: 'orange'
