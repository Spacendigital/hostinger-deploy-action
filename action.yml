name: 'Hostinger Deploy'
description: 'Deploy a Next.js app to Hostinger via SSH with GitHub Deployments tracking.'
author: 'Spacendigital'

inputs:
  host:
    description: 'Server hostname or IP (store as secret)'
    required: true
  username:
    description: 'SSH username (store as secret)'
    required: true
  password:
    description: 'SSH password'
    required: false
  private-key:
    description: 'SSH private key content (alternative to password)'
    required: false
  port:
    description: 'SSH port (store as secret)'
    required: false
    default: '22'
  domain:
    description: 'Your site domain (e.g. kellshot.com). Used to build the server path automatically. Recommended over target-dir.'
    required: false
  target-dir:
    description: 'Full project directory on the server. Alternative to domain.'
    required: false
  build-command:
    description: 'Build command (e.g. npm run build). Empty by default — Hostinger handles the build.'
    required: false
  install-command:
    description: 'Install command (e.g. npm ci). Only used if build-command is also set.'
    required: false
  deploy-mode:
    description: 'ssh or sftp'
    required: false
    default: 'ssh'
  clean:
    description: 'Delete all files in target-dir before uploading (sftp only)'
    required: false
    default: 'false'
  environment:
    description: 'GitHub deployment environment name'
    required: false
    default: 'production'
  live-url:
    description: 'Live site URL. If omitted, extracts domain from target-dir path or auto-detects.'
    required: false
  source-dir:
    description: 'Directory to upload (sftp only)'
    required: false
    default: 'out'

runs:
  using: 'node20'
  main: 'dist/index.js'

branding:
  icon: 'upload-cloud'
  color: 'orange'
