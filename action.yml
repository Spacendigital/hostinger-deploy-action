name: 'Hostinger Deploy'
description: 'Deploy a Next.js app to Hostinger via SSH with GitHub Deployments tracking.'
author: 'Spacendigital'

inputs:
  host:
    description: 'Server hostname or IP'
    required: true
  username:
    description: 'SSH username'
    required: true
  password:
    description: 'SSH password'
    required: false
  private-key:
    description: 'SSH private key content (alternative to password)'
    required: false
  port:
    description: 'SSH port'
    required: false
    default: '22'
  target-dir:
    description: 'Project directory on the server (e.g. /home/u306958712/domains/ghostwhite-tarsier-766023.hostingersite.com/public_nodejs)'
    required: true
  build-command:
    description: 'Build command to run on the server'
    required: false
    default: 'npm run build'
  install-command:
    description: 'Install command'
    required: false
    default: 'npm ci'
  deploy-mode:
    description: 'ssh or sftp'
    required: false
    default: 'ssh'
  clean:
    description: 'Delete all files in target-dir before uploading (sftp only)'
    required: false
    default: 'false'
  environment:
    description: 'GitHub deployment environment name'
    required: false
    default: 'production'
  live-url:
    description: 'Live site URL. If omitted, tries to detect from server hostname.'
    required: false
  source-dir:
    description: 'Directory to upload (sftp only)'
    required: false
    default: 'out'

runs:
  using: 'node20'
  main: 'dist/index.js'

branding:
  icon: 'upload-cloud'
  color: 'orange'
