name: 'Hostinger Deploy'
description: 'Deploy a Next.js app to Hostinger with GitHub Deployments tracking. Supports auto (Hostinger Git auto-deploy), SFTP, and FTP modes.'
author: 'Spacendigital'

inputs:
  host:
    description: 'Server hostname or IP (required for sftp/ftp modes)'
    required: false
  username:
    description: 'SFTP/SSH username (required for sftp/ftp modes)'
    required: false
  password:
    description: 'SFTP/SSH password'
    required: false
  private-key:
    description: 'SSH private key content (alternative to password)'
    required: false
  target-dir:
    description: 'Directory on the server to upload to (required for sftp/ftp modes)'
    required: false
  build-command:
    description: 'Build command to run'
    required: false
    default: 'npm run build'
  deploy-mode:
    description: 'Deploy mode: auto, sftp, or ftp'
    required: false
    default: 'auto'
  install-command:
    description: 'Install command'
    required: false
    default: 'npm ci'
  clean:
    description: 'Delete remote files before uploading (true/false)'
    required: false
    default: 'false'
  environment:
    description: 'GitHub deployment environment name'
    required: false
    default: 'production'
  live-url:
    description: 'URL of the live site (shown in deployment status). Optional — if omitted, no URL is shown in the Deployments tab.'
    required: false
  source-dir:
    description: 'Directory to upload'
    required: false
    default: 'out'

runs:
  using: 'node20'
  main: 'dist/index.js'

branding:
  icon: 'upload-cloud'
  color: 'orange'
